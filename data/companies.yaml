# Companies in the autonomous-science / lab-automation landscape.
#
# Source v1: Cheshire Labs landscape image (May 2026); identities resolved via
# web research; per-tag marketing/influence scores assigned heuristically.
#
# Tag schema:
#   {k: <key>, m: 0-5, i: 0-5}
#     k  category or thesis key
#     m  marketing emphasis  — how loud the company is about this in their pitch
#     i  influence/maturity  — actual track record / install base / revenue here
#
#   First entry in `categories` and `theses` is the *primary* axis. Order matters.
#
# Status: active | acquired | defunct | dormant. Default active.
#
# Score conventions:
#   m=5  defining their entire pitch
#   m=4  prominent in messaging
#   m=3  meaningful presence
#   m=2  minor part of pitch
#   m=1  passing mention
#   m=0  not in their pitch at all (don't tag)
#
#   i=5  category-defining incumbent
#   i=4  major established player
#   i=3  established small/mid player with real traction
#   i=2  early-stage with some proof
#   i=1  just entered, no track record yet
#   i=0  pre-product or not actually present

